name: 🚀 Deploy to Production

on:
  # Manually trigger from GitHub Actions tab (requires confirmation input)
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm deployment to LIVE production (leadcop.io)"
        required: true
        default: ""

jobs:
  deploy:
    name: Deploy → leadcop.io (PRODUCTION)
    runs-on: ubuntu-latest
    # Only run if confirmation input is correct (safety gate)
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - name: 🔍 Show deployment info
        run: |
          echo "Branch   : main"
          echo "Target   : leadcop.io"
          echo "Directory: /var/www/leadcop.io"
          echo "PM2 App  : leadcop-live (port 5002)"
          echo "Database : leadcop_prod (isolated from dev)"

      - name: 🚀 SSH & Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            export PATH="/root/.local/share/pnpm:/root/.nvm/versions/node/v22.22.0/bin:/usr/bin:$PATH"

            echo "=== Pulling latest main branch ==="
            cd /var/www/leadcop.io
            git fetch origin
            git checkout main
            git pull origin main

            echo "=== Installing dependencies ==="
            /root/.local/share/pnpm/pnpm install --frozen-lockfile

            echo "=== Building project ==="
            /root/.local/share/pnpm/pnpm run build

            echo "=== Restarting PM2 process ==="
            /usr/bin/pm2 restart leadcop-live --update-env

            echo "✅ Production deployment complete!"
            /usr/bin/pm2 status leadcop-live
