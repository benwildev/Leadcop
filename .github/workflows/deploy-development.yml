name: 🧪 Deploy to Development

on:
  # Manually trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm deployment to Development server"
        required: true
        default: "deploy"

  # Also auto-trigger on every push to development branch
  push:
    branches:
      - development

jobs:
  deploy:
    name: Deploy → email-verifier.benwil.store
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.confirm == 'deploy'

    steps:
      - name: 🔍 Show deployment info
        run: |
          echo "Branch   : development"
          echo "Target   : email-verifier.benwil.store"
          echo "Directory: /var/www/Temp-Email-SDK"
          echo "PM2 App  : email-verifier (port 5001)"

      - name: 🚀 SSH & Deploy to Development Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            export PATH="/root/.local/share/pnpm:/root/.nvm/versions/node/v22.22.0/bin:/usr/bin:$PATH"

            echo "=== Pulling latest development branch ==="
            cd /var/www/Temp-Email-SDK
            git fetch origin
            git checkout development
            git pull origin development

            echo "=== Installing dependencies ==="
            /root/.local/share/pnpm/pnpm install --frozen-lockfile

            echo "=== Building project ==="
            /root/.local/share/pnpm/pnpm run build

            echo "=== Restarting PM2 process ==="
            /usr/bin/pm2 restart email-verifier --update-env

            echo "✅ Development deployment complete!"
            /usr/bin/pm2 status email-verifier
