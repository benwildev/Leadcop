openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TempShield API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: email
    description: Email detection
  - name: user
    description: User management
  - name: admin
    description: Admin operations
  - name: domains
    description: Domain management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /check-email:
    post:
      operationId: checkEmail
      tags: [email]
      summary: Check if email is disposable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckEmailRequest"
      responses:
        "200":
          description: Email check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckEmailResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/dashboard:
    get:
      operationId: getDashboard
      tags: [user]
      summary: Get user dashboard data
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/api-key/regenerate:
    post:
      operationId: regenerateApiKey
      tags: [user]
      summary: Regenerate API key
      responses:
        "200":
          description: New API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/upgrade:
    post:
      operationId: requestUpgrade
      tags: [user]
      summary: Request plan upgrade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradeRequest"
      responses:
        "200":
          description: Upgrade request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/usage:
    get:
      operationId: getUsage
      tags: [user]
      summary: Get API usage history
      responses:
        "200":
          description: Usage history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageHistory"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Get all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{userId}/plan:
    patch:
      operationId: adminUpdateUserPlan
      tags: [admin]
      summary: Update user plan (admin only)
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlanRequest"
      responses:
        "200":
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/upgrade-requests:
    get:
      operationId: adminGetUpgradeRequests
      tags: [admin]
      summary: Get upgrade requests (admin only)
      responses:
        "200":
          description: List of upgrade requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeRequestsResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/upgrade-requests/{requestId}:
    patch:
      operationId: adminUpdateUpgradeRequest
      tags: [admin]
      summary: Approve or reject upgrade request (admin only)
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUpgradeRequestBody"
      responses:
        "200":
          description: Request updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/domains/sync:
    post:
      operationId: adminSyncDomains
      tags: [admin]
      summary: Trigger domain sync (admin only)
      responses:
        "200":
          description: Sync triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get platform stats (admin only)
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/revenue:
    get:
      operationId: adminGetRevenue
      tags: [admin]
      summary: Get revenue and subscription data (admin only)
      responses:
        "200":
          description: Revenue information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRevenue"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        message:
          type: string
      required:
        - user
        - message

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        apiKey:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        plan:
          type: string
          enum: [FREE, BASIC, PRO]
        requestCount:
          type: integer
        requestLimit:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - apiKey
        - role
        - plan
        - requestCount
        - requestLimit
        - createdAt

    CheckEmailRequest:
      type: object
      properties:
        email:
          type: string
      required:
        - email

    CheckEmailResponse:
      type: object
      properties:
        isDisposable:
          type: boolean
        domain:
          type: string
        requestsRemaining:
          type: integer
      required:
        - isDisposable
        - domain
        - requestsRemaining

    DashboardData:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        recentUsage:
          type: array
          items:
            $ref: "#/components/schemas/UsageEntry"
        usageByDay:
          type: array
          items:
            $ref: "#/components/schemas/UsageByDay"
      required:
        - user
        - recentUsage
        - usageByDay

    UsageEntry:
      type: object
      properties:
        id:
          type: integer
        endpoint:
          type: string
        timestamp:
          type: string
      required:
        - id
        - endpoint
        - timestamp

    UsageByDay:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer
      required:
        - date
        - count

    UsageHistory:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/UsageEntry"
        total:
          type: integer
      required:
        - entries
        - total

    ApiKeyResponse:
      type: object
      properties:
        apiKey:
          type: string
        message:
          type: string
      required:
        - apiKey
        - message

    UpgradeRequest:
      type: object
      properties:
        plan:
          type: string
          enum: [BASIC, PRO]
        note:
          type: string
      required:
        - plan

    AdminUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
        total:
          type: integer
      required:
        - users
        - total

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        plan:
          type: string
          enum: [FREE, BASIC, PRO]
        requestCount:
          type: integer
        requestLimit:
          type: integer
        createdAt:
          type: string
        bulkJobCount:
          type: integer
      required:
        - id
        - name
        - email
        - role
        - plan
        - requestCount
        - requestLimit
        - createdAt

    UpdatePlanRequest:
      type: object
      properties:
        plan:
          type: string
          enum: [FREE, BASIC, PRO]
        requestLimit:
          type: integer
        note:
          type: string

    UpgradeRequestsResponse:
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/UpgradeRequestItem"
        total:
          type: integer
      required:
        - requests
        - total

    UpgradeRequestItem:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        userEmail:
          type: string
        planRequested:
          type: string
          enum: [BASIC, PRO]
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        note:
          type: string
        createdAt:
          type: string
      required:
        - id
        - userId
        - userName
        - userEmail
        - planRequested
        - status
        - createdAt

    UpdateUpgradeRequestBody:
      type: object
      properties:
        status:
          type: string
          enum: [APPROVED, REJECTED]
        note:
          type: string
      required:
        - status

    SyncResponse:
      type: object
      properties:
        message:
          type: string
        domainsAdded:
          type: integer
        totalDomains:
          type: integer
      required:
        - message
        - domainsAdded
        - totalDomains

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalApiCalls:
          type: integer
        totalDomains:
          type: integer
        pendingUpgradeRequests:
          type: integer
        usersByPlan:
          type: object
          properties:
            FREE:
              type: integer
            BASIC:
              type: integer
            PRO:
              type: integer
          required:
            - FREE
            - BASIC
            - PRO
        trendData:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              month:
                type: string
              calls:
                type: integer
              users:
                type: integer
            required:
              - date
              - month
              - calls
              - users
      required:
        - totalUsers
        - totalApiCalls
        - totalDomains
        - pendingUpgradeRequests
        - usersByPlan
        - trendData

    AdminRevenueByPlan:
      type: object
      properties:
        plan:
          type: string
          enum: [FREE, BASIC, PRO]
        price:
          type: number
        userCount:
          type: integer
        revenue:
          type: number
      required:
        - plan
        - price
        - userCount
        - revenue

    AdminMonthlySubs:
      type: object
      properties:
        month:
          type: string
        count:
          type: integer
      required:
        - month
        - count

    AdminRecentSubscription:
      type: object
      properties:
        id:
          type: integer
        userName:
          type: string
        userEmail:
          type: string
        plan:
          type: string
        price:
          type: number
        approvedAt:
          type: string
          nullable: true
      required:
        - id
        - userName
        - userEmail
        - plan
        - price
        - approvedAt

    AdminRevenue:
      type: object
      properties:
        mrr:
          type: number
        totalPaidUsers:
          type: integer
        revenueByPlan:
          type: array
          items:
            $ref: "#/components/schemas/AdminRevenueByPlan"
        monthlySubs:
          type: array
          items:
            $ref: "#/components/schemas/AdminMonthlySubs"
        recent:
          type: array
          items:
            $ref: "#/components/schemas/AdminRecentSubscription"
      required:
        - mrr
        - totalPaidUsers
        - revenueByPlan
        - monthlySubs
        - recent
